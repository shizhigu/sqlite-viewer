name: 🐛 Bug report
description: Something in sqlv is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please fill in the fields below so we can reproduce.
  - type: input
    id: version
    attributes:
      label: sqlv version
      description: Output of `sqlv --version`
      placeholder: sqlv 0.1.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - CLI (sqlv binary)
        - Desktop app
        - MCP server
        - sqlv push / push-open
        - SKILL.md / agent integration
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS + version
      placeholder: macOS 14.6, Ubuntu 24.04, Windows 11, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Be specific. Include the SQL, the database schema if relevant, and the exact command(s).
      placeholder: |
        1. `sqlv tables --db foo.db`
        2. Observe that ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stderr
      render: text
