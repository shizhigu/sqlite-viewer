<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0f1024"/>
      <stop offset="55%" stop-color="#1b1d40"/>
      <stop offset="100%" stop-color="#2a1d4a"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3d8eff"/>
      <stop offset="50%" stop-color="#7a6bff"/>
      <stop offset="100%" stop-color="#ff5e85"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ff5e85"/>
      <stop offset="100%" stop-color="#ffaa44"/>
    </linearGradient>
  </defs>

  <!-- rounded terminal-tile background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#shell)"/>
  <rect x="16" y="16" width="992" height="992" rx="208" ry="208" fill="none" stroke="#2c2f60" stroke-width="3" opacity="0.6"/>

  <!-- three stylised rows ("data") behind the mark -->
  <g opacity="0.18" fill="#ffffff">
    <rect x="160" y="260" width="704" height="44" rx="12"/>
    <rect x="160" y="340" width="520" height="44" rx="12"/>
    <rect x="160" y="420" width="600" height="44" rx="12"/>
  </g>

  <!-- wordmark -->
  <text x="512" y="720" text-anchor="middle"
        font-family="SF Mono, Menlo, ui-monospace, monospace"
        font-size="420" font-weight="900" letter-spacing="-20"
        fill="url(#mark)">sqlv</text>

  <!-- blinking-style caret accent -->
  <rect x="768" y="494" width="44" height="240" fill="url(#accent)" rx="6"/>
</svg>
